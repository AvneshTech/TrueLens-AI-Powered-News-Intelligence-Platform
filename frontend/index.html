<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />

    <!-- Primary meta tags (Phase 10: SEO) -->
    <title>TrueLens — AI Fake News Detection & Media Literacy</title>
    <meta name="title" content="TrueLens — AI Fake News Detection & Media Literacy" />
    <meta name="description" content="TrueLens uses AI to detect fake news, analyze article credibility, check facts and sentiment, and help you read the news more critically." />
    <meta name="keywords" content="fake news detection, AI fact check, news credibility, media literacy, misinformation, sentiment analysis" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://app.truelens.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://app.truelens.com/" />
    <meta property="og:title" content="TrueLens — AI Fake News Detection" />
    <meta property="og:description" content="Detect fake news and analyze article credibility with AI." />
    <meta property="og:image" content="https://app.truelens.com/og-image.png" />
    <meta property="og:site_name" content="TrueLens" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TrueLens — AI Fake News Detection" />
    <meta name="twitter:description" content="Detect fake news and analyze article credibility with AI." />
    <meta name="twitter:image" content="https://app.truelens.com/og-image.png" />

    <!-- JSON-LD structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "TrueLens",
        "applicationCategory": "NewsApplication",
        "operatingSystem": "Web",
        "description": "AI-powered fake news detection and media literacy platform.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
