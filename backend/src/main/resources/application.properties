# ─── Database (PHASE 2: MongoDB Atlas) ──────────────────────────────────────
# Full connection string, e.g.:
#   mongodb+srv://USER:PASS@cluster0.xxxxx.mongodb.net/truelens?retryWrites=true&w=majority
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/truelens}
# Create @Indexed / unique / TTL indexes on startup (off by default since Boot 2.2).
spring.data.mongodb.auto-index-creation=true

server.port=${PORT:8080}

logging.level.org.springframework=INFO
logging.level.com.truelens=DEBUG

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

server.error.include-message=always

# FIX C-6: env-driven CORS origins (comma-separated). Defaults to the Vite dev server.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

news.api.key=${NEWS_API_KEY}
news.api.url=https://newsapi.org/v2/top-headlines

huggingface.api.key=${HUGGINGFACE_API_KEY}
huggingface.model=${HUGGINGFACE_MODEL}
# FIX C-5: server-side sentiment model (key never leaves the server)
huggingface.sentiment-model=${HUGGINGFACE_SENTIMENT_MODEL:cardiffnlp/twitter-roberta-base-sentiment}

# ─── AI Assistant (PHASE 5) ─────────────────────────────────────────────────
# Active provider: "anthropic" (default, streaming) or "huggingface" (legacy, non-streaming).
app.chat.provider=${CHAT_PROVIDER:anthropic}
# Automatic fallback if the primary provider fails with zero tokens emitted.
app.chat.fallback-provider=${CHAT_FALLBACK_PROVIDER:huggingface}

anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.model=${ANTHROPIC_MODEL:claude-sonnet-4-6}
anthropic.max-tokens=${ANTHROPIC_MAX_TOKENS:1024}

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ─── Email (PHASE 3: Resend) ────────────────────────────────────────────────
resend.api.key=${RESEND_API_KEY:}
app.mail.from=${MAIL_FROM:TrueLens <onboarding@resend.dev>}
# Used to build verification / reset links in emails
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}

ml.service.url=${ML_SERVICE_URL:http://localhost:5000}
