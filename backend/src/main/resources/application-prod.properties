# ============================================
# TrueLens — PRODUCTION profile
# Activate with: SPRING_PROFILES_ACTIVE=prod
# FIX H-6 + PHASE 2: hardened defaults, MongoDB Atlas.
# ============================================

# ─── Database (MongoDB Atlas) ───────────────
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.auto-index-creation=true
server.port=${PORT:8080}

# ─── Logging ────────────────────────────────
logging.level.org.springframework=WARN
logging.level.com.truelens=INFO

# ─── API docs / Swagger (off in prod) ───────
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ─── Error responses (no leakage) ───────────
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# ─── CORS (must be set per environment) ─────
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# ─── External services ──────────────────────
news.api.key=${NEWS_API_KEY}
news.api.url=https://newsapi.org/v2/top-headlines

huggingface.api.key=${HUGGINGFACE_API_KEY}
huggingface.model=${HUGGINGFACE_MODEL}
huggingface.sentiment-model=${HUGGINGFACE_SENTIMENT_MODEL:cardiffnlp/twitter-roberta-base-sentiment}

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── Email (PHASE 3: Resend) ────────────────
resend.api.key=${RESEND_API_KEY}
app.mail.from=${MAIL_FROM}
app.frontend-url=${APP_FRONTEND_URL}

ml.service.url=${ML_SERVICE_URL}
